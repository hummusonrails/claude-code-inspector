<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1018"/>
      <stop offset="50%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0b1018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- top glow -->
  <ellipse cx="640" cy="0" rx="500" ry="200" fill="url(#glow)"/>

  <!-- accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="318" width="1280" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- title -->
  <text x="640" y="115" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1.5" fill="#FFFFFF">
    Claude Code Inspector
  </text>

  <!-- subtitle -->
  <text x="640" y="165" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="400" fill="#a5f3fc">
    visualize your Claude Code usage, costs, and patterns
  </text>

  <!-- tech pills -->
  <g transform="translate(640, 220)" text-anchor="middle"
     font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
     font-size="13" font-weight="500">

    <!-- next.js -->
    <rect x="-270" y="-16" width="80" height="30" rx="15" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-230" y="4" fill="#22d3ee">Next.js</text>

    <!-- three.js -->
    <rect x="-170" y="-16" width="85" height="30" rx="15" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-128" y="4" fill="#22d3ee">Three.js</text>

    <!-- typescript -->
    <rect x="-65" y="-16" width="100" height="30" rx="15" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-15" y="4" fill="#22d3ee">TypeScript</text>

    <!-- tailwind -->
    <rect x="55" y="-16" width="90" height="30" rx="15" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="100" y="4" fill="#22d3ee">Tailwind</text>

    <!-- local only -->
    <rect x="165" y="-16" width="100" height="30" rx="15" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
    <text x="215" y="4" fill="#22d3ee">Local Only</text>
  </g>
</svg>
